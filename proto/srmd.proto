/**
 * @file srmd.proto
 * @brief gRPC protocol definition for the Switch Route Manager Daemon (srmd).
 *
 * Defines the SwitchRouteManager service used for bidirectional communication
 * between the srmd daemon and the Switch Route Application (sra) clients.
 *
 * The protocol covers:
 *  - Connectivity: Echo (test round-trip), Heartbeat
 *  - Route CRUD:   AddRoute, RemoveRoute, GetRoute, ListRoutes
 *  - Streaming:    WatchRoutes – server-push stream of route change events
 *
 * Versioning: all messages and the service live in package srmd.v1.
 *
 * @version 1.0
 */

syntax = "proto3";

package srmd.v1;

option cc_enable_arenas = true;

// ---------------------------------------------------------------------------
// Enumerations
// ---------------------------------------------------------------------------

/**
 * @brief How a route was learned / installed.
 */
enum RouteProtocol
{
    ROUTE_PROTOCOL_UNSPECIFIED = 0; ///< Default/unset.
    ROUTE_PROTOCOL_STATIC = 1;      ///< Manually configured static route.
    ROUTE_PROTOCOL_CONNECTED = 2;   ///< Directly connected network.
    ROUTE_PROTOCOL_OSPF = 3;        ///< Learned via OSPF.
    ROUTE_PROTOCOL_BGP = 4;         ///< Learned via BGP.
    ROUTE_PROTOCOL_RIP = 5;         ///< Learned via RIP.
}

/**
 * @brief Address family for a route entry.
 */
enum AddressFamily
{
    ADDRESS_FAMILY_UNSPECIFIED = 0; ///< Default/unset.
    ADDRESS_FAMILY_IPV4 = 1;        ///< IPv4 route.
    ADDRESS_FAMILY_IPV6 = 2;        ///< IPv6 route.
}

/**
 * @brief Outcome of a mutating operation.
 */
enum StatusCode
{
    STATUS_CODE_OK = 0;              ///< Operation succeeded.
    STATUS_CODE_NOT_FOUND = 1;       ///< Requested route not found.
    STATUS_CODE_ALREADY_EXISTS = 2;  ///< Route already present.
    STATUS_CODE_INVALID_ARGUMENT = 3; ///< Malformed request field.
    STATUS_CODE_INTERNAL_ERROR = 4;  ///< Unexpected server-side error.
    STATUS_CODE_PERMISSION_DENIED = 5; ///< Caller not authorised.
}

/**
 * @brief The type of change that produced a RouteEvent.
 */
enum RouteEventType
{
    ROUTE_EVENT_UNSPECIFIED = 0; ///< Default/unset.
    ROUTE_EVENT_ADDED = 1;       ///< Route was added.
    ROUTE_EVENT_REMOVED = 2;     ///< Route was removed.
    ROUTE_EVENT_UPDATED = 3;     ///< Route attributes were modified.
}

// ---------------------------------------------------------------------------
// Core data messages
// ---------------------------------------------------------------------------

/**
 * @brief A single routing table entry managed by srmd.
 */
message Route
{
    string id = 1; ///< Server-assigned unique identifier (UUID v4).
    AddressFamily address_family = 2; ///< IPv4 or IPv6.
    string destination = 3; ///< Destination prefix in CIDR notation
                            ///< (e.g. "10.0.0.0/8" or "default").
    string gateway = 4;     ///< Next-hop gateway address (may be empty
                            ///< for directly-connected routes).
    string interface_name = 5; ///< Outgoing network interface (e.g. "eth0").
    uint32 metric = 6;         ///< Route priority – lower wins.
    RouteProtocol protocol = 7; ///< How the route was learned.
    bool active = 8;            ///< True when the route is currently installed.
    int64 created_at_us = 9;    ///< Creation time (Unix epoch, microseconds).
    int64 updated_at_us = 10;   ///< Last-update time (Unix epoch, microseconds).
    map<string, string> tags = 11; ///< Arbitrary user-defined key-value tags.
}

/**
 * @brief Generic status result returned by mutating RPCs.
 */
message StatusResponse
{
    StatusCode code = 1;    ///< Operation outcome.
    string message = 2;     ///< Human-readable detail.
}

// ---------------------------------------------------------------------------
// Echo – connectivity test
// ---------------------------------------------------------------------------

/**
 * @brief Echo request: the server must return the same message field.
 */
message EchoRequest
{
    string message = 1;       ///< Arbitrary payload to echo back.
    int64 client_ts_us = 2;   ///< Client send time (Unix epoch, microseconds).
}

/**
 * @brief Echo response: mirrors the request message with server metadata.
 */
message EchoResponse
{
    string message = 1;       ///< Echoed copy of EchoRequest.message.
    int64 client_ts_us = 2;   ///< Forwarded from EchoRequest.client_ts_us.
    int64 server_ts_us = 3;   ///< Server receive time (Unix epoch, microseconds).
    string server_id = 4;     ///< Identifier of the responding srmd instance.
    string server_version = 5; ///< Full version string of the srmd binary.
}

// ---------------------------------------------------------------------------
// Heartbeat – session keepalive
// ---------------------------------------------------------------------------

/**
 * @brief Periodic keepalive ping.
 */
message HeartbeatRequest
{
    uint64 sequence = 1;    ///< Monotonically increasing sequence counter.
    int64 client_ts_us = 2; ///< Client send time (Unix epoch, microseconds).
}

/**
 * @brief Heartbeat acknowledgement.
 */
message HeartbeatResponse
{
    uint64 sequence = 1;    ///< Echo of HeartbeatRequest.sequence.
    int64 server_ts_us = 2; ///< Server reply time (Unix epoch, microseconds).
}

// ---------------------------------------------------------------------------
// AddRoute
// ---------------------------------------------------------------------------

/**
 * @brief Request to install a new route in the srmd route table.
 */
message AddRouteRequest
{
    AddressFamily address_family = 1; ///< IPv4 or IPv6.
    string destination = 2;           ///< Destination prefix (CIDR or "default").
    string gateway = 3;               ///< Next-hop gateway (optional).
    string interface_name = 4;        ///< Outgoing interface (optional).
    uint32 metric = 5;                ///< Route metric (default 0).
    RouteProtocol protocol = 6;       ///< Origin protocol.
    map<string, string> tags = 7;     ///< Optional user-defined tags.
}

/**
 * @brief Response from AddRoute / GetRoute – carries the stored Route.
 */
message RouteResponse
{
    StatusCode code = 1;  ///< Operation outcome.
    string message = 2;   ///< Human-readable detail.
    Route route = 3;      ///< The newly created or retrieved route.
}

// ---------------------------------------------------------------------------
// RemoveRoute
// ---------------------------------------------------------------------------

/**
 * @brief Request to remove a route by its server-assigned ID.
 */
message RemoveRouteRequest
{
    string id = 1; ///< Route ID returned by AddRoute.
}

// ---------------------------------------------------------------------------
// DeleteRoute
// ---------------------------------------------------------------------------

/**
 * @brief Request to delete all routes matching a destination prefix.
 */
message DeleteRouteRequest
{
    string destination = 1; ///< Destination prefix to match (CIDR or "default").
}

/**
 * @brief Response from DeleteRoute.
 */
message DeleteRouteResponse
{
    StatusCode code = 1;    ///< Operation outcome.
    string message = 2;     ///< Human-readable detail.
    uint32 deleted_count = 3; ///< Number of routes removed.
}

// ---------------------------------------------------------------------------
// GetRoute
// ---------------------------------------------------------------------------

/**
 * @brief Request to retrieve a single route by ID.
 */
message GetRouteRequest
{
    string id = 1; ///< Route ID to look up.
}

// ---------------------------------------------------------------------------
// ListRoutes
// ---------------------------------------------------------------------------

/**
 * @brief Request to enumerate all routes, with optional filters.
 */
message ListRoutesRequest
{
    AddressFamily address_family = 1; ///< Filter by family (UNSPECIFIED = all).
    RouteProtocol protocol = 2;       ///< Filter by protocol (UNSPECIFIED = all).
    bool active_only = 3;             ///< When true, only active routes returned.
}

/**
 * @brief Response carrying a snapshot of the route table.
 */
message ListRoutesResponse
{
    StatusCode code = 1;       ///< Operation outcome.
    repeated Route routes = 2; ///< Matched routes.
    int64 snapshot_ts_us = 3;  ///< Snapshot timestamp (Unix epoch, microseconds).
}

// ---------------------------------------------------------------------------
// SetLoopback / GetLoopback
// ---------------------------------------------------------------------------

/**
 * @brief Request to set the loopback address stored on the server.
 */
message SetLoopbackRequest
{
    string address = 1; ///< Loopback address to store (e.g. "10.0.0.1").
}

/**
 * @brief Response from SetLoopback.
 */
message SetLoopbackResponse
{
    StatusCode code = 1;    ///< Operation outcome.
    string message = 2;     ///< Human-readable detail.
    string address = 3;     ///< The address that was stored.
    string metric = 4;      ///< The metric.
}

/**
 * @brief Request to retrieve the loopback address stored on the server.
 */
message GetLoopbackRequest {}

/**
 * @brief Response from GetLoopback.
 */
message GetLoopbackResponse
{
    StatusCode code = 1;    ///< Operation outcome.
    string message = 2;     ///< Human-readable detail.
    string address = 3;     ///< The currently stored loopback address.
}

// ---------------------------------------------------------------------------
// GetLoopbacks – SOT-backed interface list lookup
// ---------------------------------------------------------------------------

/**
 * @brief A single IP prefix attached to a loopback interface.
 */
message LoopbackPrefix
{
    string prefix = 1;      ///< Destination prefix in CIDR notation.
    uint32 weight = 2;      ///< Routing weight / preference.
    string role = 3;        ///< Semantic role (e.g. "server_network").
    string description = 4; ///< Human-readable description.
}

/**
 * @brief An interface entry returned in GetLoopbacksResponse.
 */
message LoopbackInterface
{
    string name = 1;          ///< Interface name (e.g. "Ethernet0").
    string type = 2;          ///< Interface type ("nni" or "uni").
    string local_address = 3; ///< Local IP address with prefix (CIDR).
    string nexthop = 4;       ///< Next-hop gateway; may be empty.
    uint32 weight = 5;        ///< Interface weight / preference.
    string description = 6;   ///< Human-readable description.
    repeated LoopbackPrefix prefixes = 7; ///< Prefixes reachable via this interface.
}

/**
 * @brief Request to retrieve the interface list for a given loopback address.
 *
 * The server looks up the requesting client's IP in the SOT
 * nodes_by_loopback map.  If found, it matches @c loopback against the
 * node's loopbacks.ipv4 or loopbacks.ipv6 field and returns the
 * corresponding VRF interface list.
 */
message GetLoopbacksRequest
{
    string loopback = 1; ///< Loopback address to query (IPv4 or IPv6 string).
}

/**
 * @brief Response from GetLoopbacks.
 */
message GetLoopbacksResponse
{
    StatusCode code = 1;                    ///< Operation outcome.
    string message = 2;                     ///< Human-readable detail.
    repeated LoopbackInterface interfaces = 3; ///< Matched interface list.
}

// ---------------------------------------------------------------------------
// GetAllRoutes – all VRF routes for the requesting client
// ---------------------------------------------------------------------------

/**
 * @brief One IPv4 interface entry within a named VRF, returned by GetAllRoutes.
 *
 * Carries the complete interface context (VRF name, interface attributes, and
 * the full prefix list) so the client can reconstruct the intended routing
 * state for every VRF without additional queries.
 */
message VrfRoute
{
    string vrf_name = 1;                  ///< VRF name (e.g. "default").
    string interface_name = 2;            ///< Interface name (e.g. "Ethernet0").
    string interface_type = 3;            ///< Interface type: "nni" or "uni".
    string local_address = 4;             ///< Local address with prefix (CIDR).
    string nexthop = 5;                   ///< Next-hop gateway; empty for uni.
    uint32 weight = 6;                    ///< Interface weight / preference.
    string description = 7;              ///< Human-readable description.
    repeated LoopbackPrefix prefixes = 8; ///< Prefixes reachable via this interface.
}

/**
 * @brief Request to retrieve all VRF routes for the calling client.
 *
 * No fields are required — the server extracts the client IP from the gRPC
 * peer string and matches it against loopback IPv4 addresses in the SOT.
 */
message GetAllRoutesRequest {}

/**
 * @brief Response from GetAllRoutes: all VRF routes for the identified node.
 *
 * The server walks every VRF → every IPv4 interface → every prefix of the
 * SOT node whose loopback IPv4 matches the client's peer IP, and returns
 * the complete list as a flat sequence of VrfRoute entries.
 */
message GetAllRoutesResponse
{
    StatusCode code = 1;           ///< Operation outcome.
    string message = 2;            ///< Human-readable detail.
    string hostname = 3;           ///< Node hostname from SOT.
    string loopback_ipv4 = 4;      ///< Loopback IPv4 that matched the client IP.
    repeated VrfRoute routes = 5;  ///< All VRF route entries for this node.
}

// ---------------------------------------------------------------------------
// RequestLoopback – SOT-backed loopback lookup by client IP
// ---------------------------------------------------------------------------

/**
 * @brief Request to retrieve the loopback address assigned to this client.
 *
 * The server extracts the client IP from the gRPC peer string and looks it
 * up in the SOT nodes_by_loopback map.  No fields are needed from the
 * client – the peer address is sufficient.
 */
message RequestLoopbackRequest {}

/**
 * @brief Response from RequestLoopback.
 */
message RequestLoopbackResponse
{
    StatusCode code = 1;  ///< Operation outcome.
    string message = 2;   ///< Human-readable detail.
    string loopback = 3;  ///< The node's loopback IPv4 address from the SOT.
}

// ---------------------------------------------------------------------------
// WatchRoutes – server-side streaming
// ---------------------------------------------------------------------------

/**
 * @brief Request to subscribe to route change events.
 */
message WatchRoutesRequest
{
    AddressFamily address_family = 1; ///< Filter by family (UNSPECIFIED = all).
    bool send_initial_state = 2; ///< When true, emit a ROUTE_EVENT_ADDED for
                                 ///< every currently installed route before
                                 ///< streaming live events.
}

/**
 * @brief A single route-change event delivered over WatchRoutes stream.
 */
message RouteEvent
{
    RouteEventType type = 1; ///< What changed.
    Route route = 2;         ///< The affected route (populated for all types).
    int64 event_ts_us = 3;   ///< When the change occurred (Unix epoch, us).
}

// ---------------------------------------------------------------------------
// Service definition
// ---------------------------------------------------------------------------

/**
 * @brief The Switch Route Manager gRPC service implemented by srmd.
 *
 * The sra client connects to this service to manage the route table and
 * subscribe to live route events.  The Echo and Heartbeat RPCs are used
 * for connectivity testing and session keepalive respectively.
 */
service SwitchRouteManager
{
    /**
     * @brief Test round-trip connectivity.
     *
     * The server echoes the request message back with its own timestamp and
     * identity.  Used by `sra --test` to verify the gRPC channel.
     */
    rpc Echo(EchoRequest) returns (EchoResponse);

    /**
     * @brief Session keepalive ping.
     */
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

    /**
     * @brief Install a new route in the srmd route table.
     *
     * Returns STATUS_CODE_ALREADY_EXISTS if a route with the same
     * destination, gateway, and interface already exists.
     */
    rpc AddRoute(AddRouteRequest) returns (RouteResponse);

    /**
     * @brief Remove a route by its server-assigned ID.
     *
     * Returns STATUS_CODE_NOT_FOUND when the ID is unknown.
     */
    rpc RemoveRoute(RemoveRouteRequest) returns (StatusResponse);

    /**
     * @brief Delete all routes matching a destination prefix.
     *
     * Returns STATUS_CODE_INVALID_ARGUMENT when destination is empty.
     * Returns STATUS_CODE_NOT_FOUND when no routes match the destination.
     */
    rpc DeleteRoute(DeleteRouteRequest) returns (DeleteRouteResponse);

    /**
     * @brief Retrieve a single route by ID.
     *
     * Returns STATUS_CODE_NOT_FOUND when the ID is unknown.
     */
    rpc GetRoute(GetRouteRequest) returns (RouteResponse);

    /**
     * @brief Enumerate the current route table with optional filters.
     */
    rpc ListRoutes(ListRoutesRequest) returns (ListRoutesResponse);

    /**
     * @brief Subscribe to live route change events (server-side stream).
     *
     * The stream remains open until the client closes it or the server
     * shuts down.  If WatchRoutesRequest.send_initial_state is true, the
     * server first emits ROUTE_EVENT_ADDED for every existing route.
     */
    rpc WatchRoutes(WatchRoutesRequest)
        returns (stream RouteEvent);

    /**
     * @brief Store a loopback address on the server.
     */
    rpc SetLoopback(SetLoopbackRequest) returns (SetLoopbackResponse);

    /**
     * @brief Retrieve the loopback address stored on the server.
     */
    rpc GetLoopback(GetLoopbackRequest) returns (GetLoopbackResponse);

    /**
     * @brief Look up the interface list for a given loopback address.
     *
     * The server validates that the gRPC peer IP is registered in the SOT,
     * matches the requested loopback to the node's IPv4 or IPv6 loopback,
     * and returns the corresponding VRF interface list from the SOT.
     * Returns STATUS_CODE_PERMISSION_DENIED when the client IP is not found
     * in the SOT nodes_by_loopback map.
     */
    rpc GetLoopbacks(GetLoopbacksRequest) returns (GetLoopbacksResponse);

    /**
     * @brief Look up the loopback address for this client based on its IP.
     *
     * The server extracts the client IP from the gRPC peer string and looks
     * it up in the SOT nodes_by_loopback map.  If found, returns the node's
     * loopback IPv4 address.  Returns STATUS_CODE_NOT_FOUND when the client
     * IP is not registered in the SOT.
     */
    rpc RequestLoopback(RequestLoopbackRequest) returns (RequestLoopbackResponse);

    /**
     * @brief Retrieve all VRF routes for the calling client.
     *
     * The server matches the client's peer IP against loopback IPv4 addresses
     * in the SOT.  Returns every VRF → interface → prefix entry for the
     * matched node, giving the client a complete picture of its intended
     * routing state in a single call.
     * Returns STATUS_CODE_NOT_FOUND when the client IP is not in the SOT.
     */
    rpc GetAllRoutes(GetAllRoutesRequest) returns (GetAllRoutesResponse);
}
